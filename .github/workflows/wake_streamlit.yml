name: Wake Streamlit App

on:
    schedule:
        # 毎日 07:00 JST に実行
        # GitHub Actions の cron は UTC なので、JST(UTC+9) -> UTC 22:00
        - cron: '0 22 * * *'  # 毎日午前7時に実行
    workflow_dispatch:

jobs:
    wake:
        runs-on: ubuntu-latest
        steps:
            - name: Wake Streamlit App (ignore curl errors)
              run: |
                curl -L --max-redirs 10 -s -o /dev/null "%{http_code}\n" "https://myomi-index-app.streamlit.app" || true